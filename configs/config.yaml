# ============================================================================
# Configuration for Next Phrase Prediction (NPP) Text Auto-Completion System
# ============================================================================

# ============================================================================
# DATASET CONFIGURATION
# ============================================================================
dataset:
  raw_path: "datasets/raw"
  processed_path: "datasets/processed"
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1
  max_samples: null  # Set to integer to limit dataset size for testing
  min_sentence_length: 5
  max_sentence_length: 150
  seed: 42

# ============================================================================
# PREPROCESSING CONFIGURATION
# ============================================================================
preprocessing:
  normalize_text: true
  remove_special_chars: false
  lowercase: true
  remove_extra_whitespace: true
  remove_urls: true
  remove_emails: true
  min_phrase_length: 2
  max_phrase_length: 20
  phrase_types: ["NP", "VP", "PP"]  # Phrase types to extract
  remove_duplicates: true

# ============================================================================
# PARSING CONFIGURATION
# ============================================================================
parsing:
  parser_type: "benepar"  # Options: "benepar", "allennlp"
  model_name: "benepar_en3"
  device: "cuda"  # Options: "cuda", "cpu"
  batch_size: 32
  use_gpu: true

# ============================================================================
# NPP DATASET GENERATION CONFIGURATION
# ============================================================================
npp_generation:
  num_examples_per_sentence: 5
  strategy: "random"  # Options: "random", "systematic", "stratified"
  include_multiple_phrases: true
  phrase_type_distribution: null  # null means uniform distribution
  seed: 42

# ============================================================================
# MODEL CONFIGURATION
# ============================================================================
model:
  name: "t5-base"
  model_type: "t5"
  vocabulary_size: 32128
  vocab_file: null  # If provided, will use custom tokenizer
  max_source_length: 512
  max_target_length: 128
  device: "cuda"

# ============================================================================
# TRAINING CONFIGURATION - NPP STAGE
# ============================================================================
training:
  stage: "npp"  # Options: "npp", "finetune"
  epochs: 10
  batch_size: 32
  gradient_accumulation_steps: 1
  learning_rate: 1e-4
  weight_decay: 0.01
  warmup_steps: 500
  max_grad_norm: 1.0
  optimizer: "adamw"
  scheduler: "linear"
  mixed_precision: "fp16"  # Options: "fp16", "bf16", "no"
  save_strategy: "epoch"
  save_total_limit: 3
  eval_strategy: "epoch"
  eval_steps: null
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  early_stopping_patience: 3
  seed: 42
  num_workers: 4
  pin_memory: true
  log_level: "info"
  report_to: ["tensorboard", "wandb"]
  logging_steps: 100
  logging_dir: "outputs/logs"
  output_dir: "outputs/checkpoints/npp"
  resume_from_checkpoint: null
  dataloader_pin_memory: true
  dataloader_num_workers: 4
  remove_unused_columns: false

# ============================================================================
# FINE-TUNING CONFIGURATION
# ============================================================================
finetuning:
  stage: "finetune"
  epochs: 5
  batch_size: 16
  gradient_accumulation_steps: 2
  learning_rate: 5e-5
  weight_decay: 0.01
  warmup_steps: 200
  max_grad_norm: 1.0
  optimizer: "adamw"
  scheduler: "linear"
  mixed_precision: "fp16"
  save_strategy: "epoch"
  save_total_limit: 2
  eval_strategy: "epoch"
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"
  greater_is_better: false
  early_stopping_patience: 2
  seed: 42
  output_dir: "outputs/checkpoints/finetune"
  freeze_encoder: false
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.05
  use_lora: false

# ============================================================================
# INFERENCE CONFIGURATION
# ============================================================================
inference:
  model_path: "outputs/checkpoints/finetune"
  device: "cuda"
  batch_size: 32
  
  # Decoding strategies
  decoding_strategy: "beam_search"  # Options: "beam_search", "top_k", "top_p", "greedy"
  beam_size: 5
  num_beams: 5
  early_stopping: true
  length_penalty: 2.0
  no_repeat_ngram_size: 2
  
  # Top-k sampling
  top_k: 50
  top_p: 0.95
  temperature: 1.0
  do_sample: false
  
  # Generation
  max_length: 128
  min_length: 1
  repetition_penalty: 1.2
  diversity_penalty: 0.0
  
  # Number of candidates to return
  num_return_sequences: 5

# ============================================================================
# EVALUATION CONFIGURATION
# ============================================================================
evaluation:
  metrics: ["bleu", "meteor", "rouge", "exact_match"]
  compute_rouge: true
  use_stemmer: true
  compute_rouge_types: ["rouge1", "rouge2", "rougeL", "rougeLsum"]
  
  # BLEU
  max_n_gram: 4
  smooth: false
  
  # METEOR
  alpha: 0.9
  beta: 3.0
  gamma: 0.5
  
  # Output
  output_dir: "outputs/evaluation"
  save_predictions: true

# ============================================================================
# LOGGING AND OUTPUT
# ============================================================================
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  log_file: "outputs/logs/training.log"
  tensorboard_dir: "outputs/tensorboard"

output:
  checkpoint_dir: "outputs/checkpoints"
  results_dir: "outputs/results"
  predictions_dir: "outputs/predictions"
  create_dirs: true

# ============================================================================
# SYSTEM CONFIGURATION
# ============================================================================
system:
  seed: 42
  deterministic: true
  cudnn_benchmark: false
  num_processes: 1
  distributed_training: false
  fp16: true
  dataloader_drop_last: false
  gradient_checkpointing: true

# ============================================================================
# WEBAPP CONFIGURATION
# ============================================================================
webapp:
  model_path: "outputs/checkpoints/finetune"
  title: "🚀 Next Phrase Prediction - Text Auto-Completion"
  description: "An advanced text auto-completion system using Next Phrase Prediction with T5"
  theme: "default"
  share: false
  server_name: "0.0.0.0"
  server_port: 7860
  num_examples: 5
  temperature: 0.8
  top_p: 0.95
  beam_size: 5